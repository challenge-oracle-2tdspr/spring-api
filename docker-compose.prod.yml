services:
  agrotech-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrotech_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}        # era 20, reduza aqui também
      DDL_AUTO: ${DDL_AUTO:-validate}
      SHOW_SQL: ${SHOW_SQL:-false}
      LOG_SQL: ${LOG_SQL:-WARN}

      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-sensor_vhost}

      SENSOR_API_URL: ${SENSOR_API_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENSOR_WEBHOOK_API_KEY: ${SENSOR_WEBHOOK_API_KEY}
      SERVER_PORT: 8080

      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=40 -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -XX:ActiveProcessorCount=1"

    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 650M
        reservations:
          cpus: '0.25'
          memory: 400M