spring:
  profiles:
    active: dev
  application:
    name: agrotech

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ADMIN
    table: FLYWAY_SCHEMA_HISTORY
    baseline-on-migrate: true
    baseline-version: 1

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 60000
      connection-timeout: 20000
      max-lifetime: 600000
      pool-name: AgroTechOracleCP

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:sensor_user}
    password: ${RABBITMQ_PASSWORD:sensor_pass}
    virtual-host: ${RABBITMQ_VHOST:sensor_vhost}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000
        concurrency: 1
        max-concurrency: 2
    template:
      mandatory: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
            logger-level: NONE
      circuitbreaker:
        enabled: true

  jwt:
    expiration: 86400000

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false
        show_sql: false
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Sao_Paulo

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: WARN
    com.challengeoracle.agrotech: WARN

services:
  apex:
    field: www.teste.com
    sensor: ${SENSOR_API_URL}
    sensor-reading: www.teste.com

webhook:
  api-key: ${SENSOR_WEBHOOK_API_KEY:chave-local}